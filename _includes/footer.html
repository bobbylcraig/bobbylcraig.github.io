<footer class="site-footer h-card">
  {%- comment -%} h-card microformat anchor — gives IndieWeb parsers a u-url; intentionally invisible. {%- endcomment -%}
  <a class="u-url" href="{{ "/" | relative_url }}" aria-hidden="true" tabindex="-1"></a>
  <div class="footer-inner">
    <span>&#169; 2013-{{ 'now' | date: "%Y" }} &middot; <a class="black-link" href="{% link index.md %}">{{ site.author.name | escape }}</a></span>
    {%- include social.html -%}
  </div>
</footer>
