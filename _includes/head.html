<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  {%- seo -%}
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#fdfdfd" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#141414" media="(prefers-color-scheme: dark)" />
  <style>{{ '@import "critical";' | scssify }}</style>
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}" />
  {%- if page.content contains "<pre" -%}
  <link rel="stylesheet" href="{{ '/assets/syntax.css' | relative_url }}" />
  {%- endif -%}
  <link rel="shortcut icon" type="image/webp" href="/{{ site.favicon }}" />
  {%- feed_meta -%}
  {%- if jekyll.environment == "production" -%}{%- include google-analytics.html -%}{%- endif -%}
</head>
