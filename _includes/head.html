<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preload" href="/assets/fonts/bitter-latin.woff2" as="font" type="font/woff2" crossorigin />

  <!-- Critical CSS for first paint. Keep in sync with _sass/moving/_base.scss + _layout.scss shell rules. -->
  <style id="critical-site-shell">
    :root {
      --text: #111;
      --text-muted: #494949;
      --bg: #fdfdfd;
      --brand: #1b69d1;
      --border: #d0d0d0;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text: #e8e8ea;
        --text-muted: #a8a8b0;
        --bg: #141414;
        --brand: #4389e7;
        --border: #3a3a3f;
      }
    }

    @font-face {
      font-family: 'Bitter';
      font-style: normal;
      font-weight: 100 900;
      font-display: swap;
      src: url('/assets/fonts/bitter-latin.woff2') format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }

    html {
      color-scheme: light dark;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0 20px;
      min-height: 100vh;
      min-height: 100dvh;
      font: 400 15px/1.4 "Bitter", Georgia, "Times New Roman", serif;
      color: var(--text);
      background: var(--bg);
      -webkit-text-size-adjust: 100%;
    }

    @media screen and (min-width: 768px) {
      body {
        padding: 0 5%;
        font: 400 15px/1.5 "Bitter", Georgia, "Times New Roman", serif;
      }
    }

    .site {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
      max-width: 1024px;
      margin: 0 auto;
    }

    @media screen and (min-width: 768px) {
      .site {
        flex-direction: row;
        align-items: stretch;
        padding-top: 60px;
      }
    }

    .sidebar {
      padding: 20px 0 4px;
    }

    @media screen and (min-width: 768px) {
      .sidebar {
        width: 200px;
        flex-shrink: 0;
        padding: 0 24px 0 0;
        position: sticky;
        top: 60px;
      }
    }

    .page-content {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      flex-direction: column;
      padding: 8px 0 0;
    }

    @media screen and (min-width: 768px) {
      .page-content {
        padding: 0;
      }
    }

    main {
      display: block;
      flex: 1 1 auto;
      min-width: 0;
    }

    .wrapper {
      max-width: 720px;
      min-width: 0;
      margin-left: 0;
      margin-right: auto;
      padding-left: 0;
      padding-right: 0;
    }

    .skip-link {
      position: absolute;
      left: 8px;
      top: -40px;
      padding: 0.5rem 0.75rem;
      background: var(--bg);
      color: var(--text);
      font: 600 0.85rem -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      border: 2px solid var(--brand);
      border-radius: 4px;
      z-index: 100;
      text-decoration: none;
    }

    .skip-link:focus {
      top: 8px;
    }
  </style>

  {%- seo -%}
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#fdfdfd" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#141414" media="(prefers-color-scheme: dark)" />
  <link rel="stylesheet" href="/assets/css/main.css" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="/assets/css/main.css" /></noscript>
  {%- if page.layout == "post" -%}
  <link rel="stylesheet" href="/assets/css/syntax.css" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="/assets/css/syntax.css" /></noscript>
  {%- endif -%}
  <link rel="shortcut icon" type="image/x-icon" href="/{{ site.favicon }}" />
  {%- feed_meta -%}
  {%- if jekyll.environment == "production" -%}
  {%- include google-analytics.html -%}
  {%- endif -%}
</head>
