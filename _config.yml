title: Bobby's Homepage
author: Bobby Craig
email: # your email shown in the footer
url: https://bobbylcraig.com/ # this is your site's root address.
description: This is the homepage of Bobby Craig.
favicon: "./favicon.webp" # set the favicon of the site
show_excerpts: false # set to true to show excerpts on the homepage

# Moving date format
# refer to https://shopify.github.io/liquid/filters/date/ if you want to customize this
moving:
  avatar_url: "/assets/images/bobby.webp" # avatar in about page
  about_you: 
  date_format: "%b %d" # date format of posts in home page
  back_to: "Home" # In the post page, you have a back button above the title, you can custom the text by yourself.

  # generate social links in about page.
  social_links:
    # twitter:
    github: bobbylcraig
    # rss: RSS
    # dribbble: bobbylcraig
    # facebook:
    # flickr:
    # instagram:
    linkedin: bobbylcraig
    # pinterest:
    # youtube:
    # youtube_channel:
    # youtube_channel_name:
    # telegram:
    # googleplus:
    # microdotblog:
    # reddit:
    bluesky: bobbylcraig

    # Mastodon instances
    # mastodon:
    # - username:
    #   instance:
    # - username:
    #   instance:

# Build settings
sass:
  style: compressed # minify compiled main.css

remote_theme: huangyz0918/moving # note, please use huangyz0918/moving if you want to publish to Github Pages.

plugins:
  - jekyll-feed
  - jekyll-seo-tag
